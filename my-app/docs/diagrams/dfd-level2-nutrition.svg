<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 720" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="arrow-user" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#059669"/>
    </marker>
    <filter id="shadow"><feDropShadow dx="1" dy="1" stdDeviation="1.5" flood-color="#00000015"/></filter>
  </defs>

  <rect width="1050" height="720" fill="#f8fafc" rx="8"/>

  <text x="525" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a">第 2 层 DFD — P2 营养管理展开</text>
  <line x1="250" y1="42" x2="800" y2="42" stroke="#cbd5e1" stroke-width="1"/>

  <!-- User -->
  <rect x="30" y="100" width="110" height="40" rx="5" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="85" y="125" text-anchor="middle" font-size="12" font-weight="bold" fill="#334155">用户</text>

  <!-- P2.1 Get Food Categories -->
  <rect x="200" y="80" width="210" height="70" rx="8" fill="#059669" filter="url(#shadow)"/>
  <text x="305" y="103" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">P2.1 获取食物分类列表</text>
  <text x="305" y="120" text-anchor="middle" font-size="10" fill="#d1fae5">GET /api/nutrition/food-categories</text>
  <text x="305" y="137" text-anchor="middle" font-size="10" fill="#d1fae5">ensureSystemFoodData → 查询分类+食物</text>

  <!-- P2.2 Create Meal -->
  <rect x="200" y="210" width="210" height="85" rx="8" fill="#059669" filter="url(#shadow)"/>
  <text x="305" y="233" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">P2.2 录入餐饮</text>
  <text x="305" y="250" text-anchor="middle" font-size="10" fill="#d1fae5">POST /api/nutrition/meals</text>
  <text x="305" y="267" text-anchor="middle" font-size="10" fill="#d1fae5">校验食物ID → 计算营养值</text>
  <text x="305" y="284" text-anchor="middle" font-size="10" fill="#d1fae5">→ 创建 MealRecord + MealFood</text>

  <!-- P2.3 Recalculate -->
  <rect x="500" y="210" width="210" height="85" rx="8" fill="#059669" filter="url(#shadow)"/>
  <text x="605" y="233" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">P2.3 重算当日营养汇总</text>
  <text x="605" y="250" text-anchor="middle" font-size="10" fill="#d1fae5">调用 recalculateDailyNutrition</text>
  <text x="605" y="267" text-anchor="middle" font-size="10" fill="#d1fae5">汇总所有 MealRecord → upsert</text>
  <text x="605" y="284" text-anchor="middle" font-size="10" fill="#d1fae5">DailyNutrition 每日总览</text>

  <!-- P2.4 Get Today -->
  <rect x="200" y="350" width="210" height="85" rx="8" fill="#059669" filter="url(#shadow)"/>
  <text x="305" y="373" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">P2.4 查看当日营养</text>
  <text x="305" y="390" text-anchor="middle" font-size="10" fill="#d1fae5">GET /api/nutrition/today</text>
  <text x="305" y="407" text-anchor="middle" font-size="10" fill="#d1fae5">查询 user_profiles 获取目标</text>
  <text x="305" y="424" text-anchor="middle" font-size="10" fill="#d1fae5">→ 查询 DailyNutrition + MealRecords</text>

  <!-- P2.5 Delete Meal -->
  <rect x="500" y="350" width="210" height="85" rx="8" fill="#059669" filter="url(#shadow)"/>
  <text x="605" y="373" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">P2.5 删除餐次</text>
  <text x="605" y="390" text-anchor="middle" font-size="10" fill="#d1fae5">DELETE /api/nutrition/meals/[id]</text>
  <text x="605" y="407" text-anchor="middle" font-size="10" fill="#d1fae5">校验归属 → 删除 MealRecord</text>
  <text x="605" y="424" text-anchor="middle" font-size="10" fill="#d1fae5">→ 触发 P2.3 重新汇总</text>

  <!-- Data Stores -->
  <g transform="translate(790, 80)">
    <rect x="0" y="10" width="160" height="50" rx="3" fill="#f1f5f9" stroke="#475569" stroke-width="1.5"/>
    <path d="M0,10 Q0,0 12,0 L148,0 Q160,0 160,10" fill="#e2e8f0" stroke="#475569" stroke-width="1.5"/>
    <line x1="0" y1="10" x2="160" y2="10" stroke="#475569" stroke-width="1.5"/>
    <text x="80" y="27" text-anchor="middle" font-size="11" font-weight="bold" fill="#334155">food_categories</text>
    <text x="80" y="43" text-anchor="middle" font-size="10" fill="#64748b">name, sortOrder, icon</text>
    <text x="80" y="56" text-anchor="middle" font-size="9" fill="#94a3b8">1 : N → food_items</text>
  </g>

  <g transform="translate(790, 170)">
    <rect x="0" y="10" width="160" height="50" rx="3" fill="#f1f5f9" stroke="#475569" stroke-width="1.5"/>
    <path d="M0,10 Q0,0 12,0 L148,0 Q160,0 160,10" fill="#e2e8f0" stroke="#475569" stroke-width="1.5"/>
    <line x1="0" y1="10" x2="160" y2="10" stroke="#475569" stroke-width="1.5"/>
    <text x="80" y="27" text-anchor="middle" font-size="11" font-weight="bold" fill="#334155">food_items</text>
    <text x="80" y="43" text-anchor="middle" font-size="10" fill="#64748b">calories/100g, 宏量营养</text>
    <text x="80" y="56" text-anchor="middle" font-size="9" fill="#94a3b8">系统预设 + 用户自定义</text>
  </g>

  <g transform="translate(790, 260)">
    <rect x="0" y="10" width="160" height="50" rx="3" fill="#f1f5f9" stroke="#475569" stroke-width="1.5"/>
    <path d="M0,10 Q0,0 12,0 L148,0 Q160,0 160,10" fill="#e2e8f0" stroke="#475569" stroke-width="1.5"/>
    <line x1="0" y1="10" x2="160" y2="10" stroke="#475569" stroke-width="1.5"/>
    <text x="80" y="27" text-anchor="middle" font-size="11" font-weight="bold" fill="#334155">meal_records</text>
    <text x="80" y="43" text-anchor="middle" font-size="10" fill="#64748b">mealType, totalCalories</text>
    <text x="80" y="56" text-anchor="middle" font-size="9" fill="#94a3b8">breakfast/lunch/dinner/snack</text>
  </g>

  <g transform="translate(790, 350)">
    <rect x="0" y="10" width="160" height="50" rx="3" fill="#f1f5f9" stroke="#475569" stroke-width="1.5"/>
    <path d="M0,10 Q0,0 12,0 L148,0 Q160,0 160,10" fill="#e2e8f0" stroke="#475569" stroke-width="1.5"/>
    <line x1="0" y1="10" x2="160" y2="10" stroke="#475569" stroke-width="1.5"/>
    <text x="80" y="27" text-anchor="middle" font-size="11" font-weight="bold" fill="#334155">meal_foods (关联表)</text>
    <text x="80" y="43" text-anchor="middle" font-size="10" fill="#64748b">quantityG, 计算热量</text>
    <text x="80" y="56" text-anchor="middle" font-size="9" fill="#94a3b8">N:1→meal_records, N:1→food_items</text>
  </g>

  <g transform="translate(790, 440)">
    <rect x="0" y="10" width="160" height="50" rx="3" fill="#f1f5f9" stroke="#475569" stroke-width="1.5"/>
    <path d="M0,10 Q0,0 12,0 L148,0 Q160,0 160,10" fill="#e2e8f0" stroke="#475569" stroke-width="1.5"/>
    <line x1="0" y1="10" x2="160" y2="10" stroke="#475569" stroke-width="1.5"/>
    <text x="80" y="27" text-anchor="middle" font-size="11" font-weight="bold" fill="#334155">daily_nutrition</text>
    <text x="80" y="43" text-anchor="middle" font-size="10" fill="#64748b">当日汇总 (物化聚合)</text>
    <text x="80" y="56" text-anchor="middle" font-size="9" fill="#94a3b8">UK: userId + recordDate</text>
  </g>

  <g transform="translate(790, 530)">
    <rect x="0" y="10" width="160" height="40" rx="3" fill="#f1f5f9" stroke="#475569" stroke-width="1.5"/>
    <path d="M0,10 Q0,0 12,0 L148,0 Q160,0 160,10" fill="#e2e8f0" stroke="#475569" stroke-width="1.5"/>
    <line x1="0" y1="10" x2="160" y2="10" stroke="#475569" stroke-width="1.5"/>
    <text x="80" y="27" text-anchor="middle" font-size="11" font-weight="bold" fill="#334155">user_profiles</text>
    <text x="80" y="43" text-anchor="middle" font-size="10" fill="#64748b">营养目标值 (读数用)</text>
  </g>

  <!-- User -> P2.1 -->
  <line x1="140" y1="110" x2="200" y2="110" stroke="#059669" stroke-width="1.5" marker-end="url(#arrow-user)"/>
  <text x="160" y="103" font-size="9" fill="#059669">查看食物</text>

  <!-- User -> P2.2 -->
  <line x1="140" y1="125" x2="200" y2="245" stroke="#059669" stroke-width="1.5" marker-end="url(#arrow-user)"/>
  <text x="155" y="185" font-size="9" fill="#059669">food+份量+油脂选项</text>

  <!-- User -> P2.4 -->
  <line x1="140" y1="135" x2="200" y2="385" stroke="#059669" stroke-width="1.5" marker-end="url(#arrow-user)"/>
  <text x="155" y="275" font-size="9" fill="#059669">查看今日营养</text>

  <!-- P2.1 -> DS -->
  <line x1="410" y1="105" x2="790" y2="105" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="410" y1="125" x2="790" y2="195" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- P2.2 -> P2.3 -->
  <line x1="410" y1="250" x2="500" y2="250" stroke="#475569" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="450" y="240" font-size="9" fill="#64748b">创建成功后触发</text>

  <!-- P2.2 -> DS -->
  <line x1="410" y1="235" x2="790" y2="285" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="520" y="250" font-size="8" fill="#64748b">创建 MealRecord + MealFood</text>
  <line x1="410" y1="265" x2="790" y2="375" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- P2.3 -> DS -->
  <line x1="605" y1="210" x2="790" y2="465" stroke="#475569" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="700" y="340" font-size="8" fill="#64748b">upsert daily_nutrition</text>
  <line x1="710" y1="285" x2="790" y2="285" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="740" y="280" font-size="8" fill="#64748b">读取</text>

  <!-- P2.4 -> DS -->
  <line x1="410" y1="375" x2="790" y2="550" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="520" y="480" font-size="8" fill="#64748b">读取档案目标值</text>
  <line x1="410" y1="400" x2="790" y2="465" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="600" y="440" font-size="8" fill="#64748b">读取</text>

  <!-- P2.5 -> P2.3 -->
  <line x1="500" y1="395" x2="430" y2="395" stroke="#475569" stroke-width="1.2"/>
  <line x1="430" y1="395" x2="430" y2="295" stroke="#475569" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="440" y="350" font-size="8" fill="#64748b">删除后触发重算</text>

  <!-- P2.5 -> DS -->
  <line x1="710" y1="375" x2="790" y2="285" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="740" y="325" font-size="8" fill="#64748b">删除</text>

  <!-- Oil Option Special Note -->
  <rect x="30" y="520" width="380" height="60" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="220" y="540" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e">🔶 油脂选项 (OilOption) 特殊处理</text>
  <text x="220" y="558" text-anchor="middle" font-size="10" fill="#92400e">油脂用量不通过手动克数录入，用户选择预设档位(无油/少油/中等/多油)</text>
  <text x="220" y="573" text-anchor="middle" font-size="10" fill="#92400e">系统内部映射到 food_items 中 name="食用油" 条目，自动计算热量和脂肪</text>

  <!-- Validation Note -->
  <rect x="30" y="600" width="380" height="50" rx="6" fill="#e0f2fe" stroke="#0284c7" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="220" y="618" text-anchor="middle" font-size="11" font-weight="bold" fill="#0369a1">校验规则</text>
  <text x="220" y="635" text-anchor="middle" font-size="10" fill="#0369a1">- 主食 10-2000g | 肉类/蔬菜 10-1000g</text>
  <text x="220" y="648" text-anchor="middle" font-size="10" fill="#0369a1">- 每餐最多 20 种食物 | 油脂分类禁止手动录入克数</text>

  <!-- Legend -->
  <rect x="450" y="520" width="570" height="130" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="470" y="542" font-size="12" font-weight="bold" fill="#334155">核心数据流</text>
  <text x="470" y="562" font-size="10" fill="#334155">1. 用户选择食物 → P2.2 校验foodId → 计算营养 → 创建 MealRecord+MealFood</text>
  <text x="470" y="578" font-size="10" fill="#334155">2. P2.2 完成后 → P2.3 重新汇总当天所有餐次 → upsert DailyNutrition</text>
  <text x="470" y="594" font-size="10" fill="#334155">3. P2.4 读取 user_profiles (目标值) + DailyNutrition (实际值) + MealRecords (明细)</text>
  <text x="470" y="610" font-size="10" fill="#334155">4. P2.5 删除餐次 → 触发 P2.3 重新汇总 → 保持数据一致性</text>
  <text x="470" y="626" font-size="10" fill="#334155">5. 所有写入操作均使用 Prisma $transaction 保证事务一致性</text>
  <text x="470" y="642" font-size="10" fill="#334155">6. 油脂通过预设档位 (oilOptions) 映射到内部 "食用油" foodItem</text>
</svg>
